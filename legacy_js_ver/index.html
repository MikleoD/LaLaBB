<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lapis-lazuli Live2D</title>



    <!-- Font -->

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css?family=Noto+Sans+KR">



    <!-- Cubism SDK -->

    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>


    <script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>



    <!-- Pixi -->

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>



    <!-- Live2D loader -->

    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>



    <!-- Brython -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/brython/3.11.2/brython.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/brython/3.11.2/brython_stdlib.min.js"></script>



    <!-- Scripts -->

    <script src="console_redirect.js"></script>

    <script type="text/python" src="main_script.py"></script>



    <link rel="stylesheet" href="style.css">


</head>




<body onload="brython(1)">



    <!-- Live2D display -->

    <canvas id="live2d_canvas"></canvas>





    <!--
        Hidden elements required by main_script.py

        They are invisible but necessary for Brython.
    -->

    <div style="display:none;">



        <div id="header"></div>



        <div class="UrlBox">


            <input
                id="input_btn"
                type="button"
                value="Load"
            >



            <input
                id="input_field"
                type="text"
                placeholder="url to json file..."
            >


        </div>





        <label>


            <input
                type="checkbox"
                id="interaction_check"
                checked
            >


            Interaction


        </label>





        <div id="motion_panel">

            <div id="motion_list"></div>

        </div>





        <div id="emotion_panel">

            <div id="emotion_list"></div>

        </div>





        <div id="console"></div>



    </div>




</body>


</html>
